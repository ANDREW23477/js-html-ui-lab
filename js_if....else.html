<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>greetings</h1>
    <p id="time"></p>
    <p id="age"></p>
    <script>
        /*If time is less than 10:00, create a "Good morning" greeting,
         if not, but time is less than 20:00,
         create a "Good day" greeting, otherwise a "Good evening":*/
                    if (time < 10) {
            greeting = "Good morning";
            } else if (time < 20) {
            greeting = "Good day";
            } else {
            greeting = "Good evening";
            }
            document.getElementById("time").innerHTML = greeting;
    </script>
    <script>
        /*if a person is less age 20
         years generate "young" if not,
        but if a person is age 20 to 40 years, generate "adult" age,
         otherwise generate "old adult"*/
         if (time < 20) {
            age = "young";
            } else if (time > 20 to 40) {
            age = "adult";
            } else {
            age = "old adult";
            }
            document.getElementById("age").innerHTML = age;
    </script>
</body>
</html>

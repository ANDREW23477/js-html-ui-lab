            </select>
        </div>
    </div> 
    <script>
        function getColleagueStatus(colleague) {
  if (colleague.isIn) {
    return "Yes";
  } else {
    // If they aren't in, we grab their reason (defaulting to 'not specified' if empty)
    const reason = colleague.reason || "not specified";
    return `No (Reason: ${reason})`;
  }
}
